server:
  port: 8090

spring:
  profiles:
    active: qa   # ✅ NOW correct

  config:
    import:
      - "classpath:application-qa.yml"
      - "classpath:application-prod.yml"

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
